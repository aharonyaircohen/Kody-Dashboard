# Fly deploy config for the preview builder service.
# Deploy with:
#   flyctl deploy -c builder/fly.toml --app kody-preview-builder
#
# This service uses Fly's hosted remote builder under the hood (flyctl
# deploy --build-only), so it doesn't need privileged docker. A small
# VM is enough; the heavy build CPU lives on Fly's builder infra.

app = "kody-preview-builder"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024
