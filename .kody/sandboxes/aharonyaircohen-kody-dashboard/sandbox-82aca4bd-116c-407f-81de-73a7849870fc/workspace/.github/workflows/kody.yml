# Drop this file at .github/workflows/kody.yml in your repo.
#
# Triggers forward every relevant event to `kody`; the engine decides what
# (if anything) to do. The job runs `npx kody` — no shell branching, no
# routing logic in YAML. All orchestration lives in the kody npm package;
# future capabilities ship via `npm publish`, not by editing this file.
#
# Required repo secrets: at least one model provider key (e.g. MINIMAX_API_KEY,
# ANTHROPIC_API_KEY). kody reads any *_API_KEY secret automatically via
# toJSON(secrets) — no need to list them here.
#
# Recommended: KODY_TOKEN secret — a fine-grained PAT or GitHub App token
# with `repo` + `read:org` + `workflow` scopes. Without it, kody's
# commits/PR-creation still work via github.token, but three things degrade:
#   1. PR body updates fail with "token lacks read:org scope" (cosmetic).
#   2. Pushes from kody won't trigger downstream workflows.
#   3. Any commit that modifies `.github/workflows/*` is REJECTED by
#      GitHub — the default GITHUB_TOKEN can't touch workflow files.
# Set KODY_TOKEN in repo Settings → Secrets → Actions.

name: kody

on:
  workflow_dispatch:
    inputs:
      executable:
        description: "Executable name (e.g. ui-review, run, fix)"
        type: string
        default: ""
      issue_number:
        description: "GitHub issue number (agent mode)"
        type: string
        default: ""
      sessionId:
        description: "Chat session ID (chat mode, from Kody-Dashboard)"
        type: string
        default: ""
      message:
        description: "Initial chat message (optional)"
        type: string
        default: ""
      model:
        description: "Model override (optional, e.g. anthropic/claude-haiku-4-5-20251001)"
        type: string
        default: ""
      dashboardUrl:
        description: "Dashboard event ingest URL with inline ?token=... (chat mode)"
        type: string
        default: ""
      sandboxId:
        description: "Kody sandbox profile id (chat mode)"
        type: string
        default: ""
  issue_comment:
    types: [created]
  pull_request:
    types: [closed]
  schedule:
    # Wakes every 30 minutes; kody fans out to whichever scheduled executables
    # (job-scheduler, memorize, watch-stale-prs, …) match this tick.
    #
    # `memorize` writes to `.kody/vault/` and opens a daily PR. If your
    # `.gitignore` ignores `.kody/*`, add `!.kody/vault/` and `!.kody/vault/**`
    # so memorize's pages are tracked.
    - cron: "*/15 * * * *"

jobs:
  run:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    concurrency:
      group: kody-${{ inputs.sessionId || inputs.issue_number || github.event.issue.number || github.sha }}
      cancel-in-progress: false
    permissions:
      issues: write
      pull-requests: write
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref }}
          token: ${{ secrets.KODY_TOKEN || github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore Kody sandbox
        if: ${{ inputs.sandboxId != '' }}
        env:
          KODY_MASTER_KEY: ${{ secrets.KODY_MASTER_KEY }}
          KODY_SANDBOX_ID: ${{ inputs.sandboxId }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          if [ -z "${KODY_MASTER_KEY:-}" ]; then
            echo "::error::KODY_MASTER_KEY secret is required to restore sandbox snapshots"
            exit 1
          fi
          scope="$(printf '%s/%s' "$REPO_OWNER" "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"
          snapshot=".kody/sandboxes/${scope}/${KODY_SANDBOX_ID}/snapshot.tar.gz.enc"
          if [ ! -f "$snapshot" ]; then
            echo "::error::Sandbox snapshot not found: $snapshot"
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/kody-sandbox"
          SNAPSHOT_PATH="$snapshot" OUT_PATH="$RUNNER_TEMP/kody-sandbox/snapshot.tar.gz" node <<'NODE'
          const { createDecipheriv } = require("crypto");
          const fs = require("fs");
          const payload = fs.readFileSync(process.env.SNAPSHOT_PATH);
          const newline = payload.indexOf(10);
          if (newline === -1) throw new Error("Snapshot header missing");
          const [version, ivB64, tagB64] = payload.subarray(0, newline).toString("utf8").split(":");
          if (version !== "kody-sandbox-snapshot-v1" || !ivB64 || !tagB64) throw new Error("Snapshot header invalid");
          const raw = process.env.KODY_MASTER_KEY || "";
          const key = /^[0-9a-fA-F]{64}$/.test(raw) ? Buffer.from(raw, "hex") : Buffer.from(raw, "base64");
          if (key.length !== 32) throw new Error("KODY_MASTER_KEY must decode to 32 bytes");
          const decipher = createDecipheriv("aes-256-gcm", key, Buffer.from(ivB64, "base64"));
          decipher.setAuthTag(Buffer.from(tagB64, "base64"));
          fs.writeFileSync(process.env.OUT_PATH, Buffer.concat([decipher.update(payload.subarray(newline + 1)), decipher.final()]));
          NODE
          tar -xzf "$RUNNER_TEMP/kody-sandbox/snapshot.tar.gz" -C "$RUNNER_TEMP/kody-sandbox"
          rsync -a --delete --exclude='.git' --exclude='.kody/sandboxes' "$RUNNER_TEMP/kody-sandbox/workspace/" "$GITHUB_WORKSPACE/"

      - env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
          SESSION_ID: ${{ inputs.sessionId }}
          INIT_MESSAGE: ${{ inputs.message }}
          MODEL: ${{ inputs.model }}
          DASHBOARD_URL: ${{ inputs.dashboardUrl }}
          KODY_SANDBOX_ID: ${{ inputs.sandboxId }}
        run: |
          if [ -n "${KODY_SANDBOX_ID:-}" ] && [ -d "$RUNNER_TEMP/kody-sandbox/home" ]; then
            export HOME="$RUNNER_TEMP/kody-sandbox/home"
          fi
          npx -y -p @kody-ade/kody-engine@latest kody-engine

      - name: Save Kody sandbox
        if: ${{ always() && inputs.sandboxId != '' }}
        env:
          KODY_MASTER_KEY: ${{ secrets.KODY_MASTER_KEY }}
          KODY_SANDBOX_ID: ${{ inputs.sandboxId }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          if [ ! -d "$RUNNER_TEMP/kody-sandbox/home" ]; then
            echo "Sandbox was not restored; skipping save"
            exit 0
          fi
          scope="$(printf '%s/%s' "$REPO_OWNER" "$REPO_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/^-+|-+$//g')"
          snapshot=".kody/sandboxes/${scope}/${KODY_SANDBOX_ID}/snapshot.tar.gz.enc"
          mkdir -p "$(dirname "$snapshot")"
          rsync -a --delete --exclude='.git' --exclude='.kody/sandboxes' "$GITHUB_WORKSPACE/" "$RUNNER_TEMP/kody-sandbox/workspace/"
          tar -czf "$RUNNER_TEMP/kody-sandbox/snapshot.tar.gz" -C "$RUNNER_TEMP/kody-sandbox" home workspace sandbox.json
          SNAPSHOT_PATH="$snapshot" IN_PATH="$RUNNER_TEMP/kody-sandbox/snapshot.tar.gz" node <<'NODE'
          const { createCipheriv, randomBytes } = require("crypto");
          const fs = require("fs");
          const raw = process.env.KODY_MASTER_KEY || "";
          const key = /^[0-9a-fA-F]{64}$/.test(raw) ? Buffer.from(raw, "hex") : Buffer.from(raw, "base64");
          if (key.length !== 32) throw new Error("KODY_MASTER_KEY must decode to 32 bytes");
          const iv = randomBytes(12);
          const plaintext = fs.readFileSync(process.env.IN_PATH);
          const cipher = createCipheriv("aes-256-gcm", key, iv);
          const ciphertext = Buffer.concat([cipher.update(plaintext), cipher.final()]);
          const header = `kody-sandbox-snapshot-v1:${iv.toString("base64")}:${cipher.getAuthTag().toString("base64")}\n`;
          fs.writeFileSync(process.env.SNAPSHOT_PATH, Buffer.concat([Buffer.from(header), ciphertext]));
          NODE
          git config user.name "kody-bot"
          git config user.email "kody-bot@users.noreply.github.com"
          git add -f "$snapshot"
          git commit -m "chore(kody): save sandbox ${KODY_SANDBOX_ID} [skip ci]" || exit 0
          git push
